apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontend.serviceName }}
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    app: {{ .Values.frontend.appName }}
    tier: frontend
spec:
  type: {{ .Values.frontend.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.frontend.service.port | default 80 }}
      targetPort: {{ .Values.frontend.service.targetPort | default 80 }}
      protocol: TCP
      name: {{ .Values.frontend.service.port_name  }}
     # nodePort: {{ .Values.frontend.service.nodePort }}  
  selector:
    app: {{ .Values.frontend.appName }}
    tier: frontend