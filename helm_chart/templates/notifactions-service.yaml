apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.notifactions.serviceName }}
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    app: {{ .Values.notifactions.appName}}
    tier: notifactions
spec:
  type: {{ .Values.notifactions.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.notifactions.service.port | default 80 }}
      targetPort: {{ .Values.notifactions.service.targetPort | default 80 }}
      protocol: TCP
      name: notifactions-port
      
  selector:
    app: {{ .Values.notifactions.appName}}
    tier: notifactions