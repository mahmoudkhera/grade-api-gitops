apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.appName }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"

spec:
  ingressClassName: nginx
  rules:
  - host:  {{ .Values.ingress.frontend_host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{.Values.frontend.serviceName}}
            port: 
              name: {{.Values.frontend.service.port_name}}
  - host: {{ .Values.ingress.inventory_host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{.Values.inventory.serviceName}}
            port:
              name: {{.Values.inventory.service.port_name}}